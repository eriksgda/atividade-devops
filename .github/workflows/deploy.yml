name: CD - Deploy GitHub Pages

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          export VITE_BASE=/atividade-devops/
          npm run build

      - name: Build upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: GitHub Pages Deploy
        uses: actions/deploy-pages@v4

      - name: Alert Discord
        if: always()
        run: |
          STATUS="${{ job.status }}"
          USER="${{ github.actor }}"
          BRANCH="${{ github.ref_name }}"

          if [ "$STATUS" = "success" ]; then
            MSG="✓ Deploy SUCCESS - by $USER on $BRANCH"
          else
            MSG="X Deploy FAILED - by $USER on $BRANCH"
          fi

          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"$MSG\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}
